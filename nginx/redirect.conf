# nginx/redirect.conf
# Requires the ngx_http_geoip_module or geoip2 module to be enabled

# 1. Define the rotation of URLs. We use $msec (current time in milliseconds) to randomize.
split_clients "${msec}" $wiki_url {
    16.6%   "https://en.wikipedia.org/wiki/War_crimes_in_the_Russo-Ukrainian_war_(2022%E2%80%93present)";
    16.6%   "https://en.wikipedia.org/wiki/Russian_war_crimes";
    16.6%   "https://en.wikipedia.org/wiki/Atrocity_crimes_during_the_Russo-Ukrainian_war";
    16.6%   "https://en.wikipedia.org/wiki/Bucha_massacre";
    16.6%   "https://en.wikipedia.org/wiki/Siege_of_Mariupol";
    *       "https://en.wikipedia.org/wiki/Child_abductions_in_the_Russo-Ukrainian_war";
}

server {
    # ... your existing server configuration ...

    # 2. Redirect if the country is Russia (RU)
    if ($geoip_country_code = RU) {
        return 302 $wiki_url;
    }

    # ...
}
