# lighttpd/lighttpd.conf
# Requires mod_geoip and mod_redirect

server.modules += ( 
    "mod_geoip", 
    "mod_redirect" 
)

# Configure GeoIP database path
geoip.memory-cache = "enable"
geoip.db-filename = "/usr/share/GeoIP/GeoIP.dat"

# Check if the visitor's country code is Russia
$HTTP["geoip-country-code"] == "RU" {
    # Perform the redirect
    # Lighttpd does not natively support dynamic array rotation without lua or fastcgi scripts.
    url.redirect = (
        "" => "https://en.wikipedia.org/wiki/Casualties_of_the_Russo-Ukrainian_War"
    )
}
